<script src="https:{:config('cdnpublic')}vue/2.5.21/vue.min.js"></script>

<script>

    function aaa() {
        if ($('#orderDetail').hasClass('detail-open')) {
            $('#orderDetail .detail-ct').slideUp(500, function () {
                $('#orderDetail').removeClass('detail-open');
            });
        } else {
            $('#orderDetail .detail-ct').slideDown(500, function () {
                $('#orderDetail').addClass('detail-open');
            });
        }
    }
    function formatDate(now) {
        now = new Date(now*1000)
        return now.getFullYear()
            + "-" + (now.getMonth()>8?(now.getMonth()+1):"0"+(now.getMonth()+1))
            + "-" + (now.getDate()>9?now.getDate():"0"+now.getDate())
            + " " + (now.getHours()>9?now.getHours():"0"+now.getHours())
            + ":" + (now.getMinutes()>9?now.getMinutes():"0"+now.getMinutes())
            + ":" + (now.getSeconds()>9?now.getSeconds():"0"+now.getSeconds());

    }
    var myTimer;
    function timer(intDiff) {
        var i = 0;
        i++;
        var day = 0,
            hour = 0,
            minute = 0,
            second = 0;//时间默认值
        if (intDiff > 0) {
            day = Math.floor(intDiff / (60 * 60 * 24));
            hour = Math.floor(intDiff / (60 * 60)) - (day * 24);
            minute = Math.floor(intDiff / 60) - (day * 24 * 60) - (hour * 60);
            second = Math.floor(intDiff) - (day * 24 * 60 * 60) - (hour * 60 * 60) - (minute * 60);
        }
        if (minute <= 9) minute = '0' + minute;
        if (second <= 9) second = '0' + second;
        $('#hour_show').html('<s id="h"></s>' + hour + '时');
        $('#minute_show').html('<s></s>' + minute + '分');
        $('#second_show').html('<s></s>' + second + '秒');
        if (hour <= 0 && minute <= 0 && second <= 0) {
            qrcode_timeout()
            clearInterval(myTimer);

        }
        intDiff--;

        myTimer = window.setInterval(function () {
            i++;
            var day = 0,
                hour = 0,
                minute = 0,
                second = 0;//时间默认值
            if (intDiff > 0) {
                day = Math.floor(intDiff / (60 * 60 * 24));
                hour = Math.floor(intDiff / (60 * 60)) - (day * 24);
                minute = Math.floor(intDiff / 60) - (day * 24 * 60) - (hour * 60);
                second = Math.floor(intDiff) - (day * 24 * 60 * 60) - (hour * 60 * 60) - (minute * 60);
            }
            if (minute <= 9) minute = '0' + minute;
            if (second <= 9) second = '0' + second;
            $('#hour_show').html('<s id="h"></s>' + hour + '时');
            $('#minute_show').html('<s></s>' + minute + '分');
            $('#second_show').html('<s></s>' + second + '秒');
            if (hour <= 0 && minute <= 0 && second <= 0) {
                qrcode_timeout()
                clearInterval(myTimer);

            }
            intDiff--;
        }, 1000);
    }



    function qrcode_timeout(){
        document.getElementById("orderbody").style.display = "none";
        document.getElementById("timeOut").style.display = "";
    }


    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        if (r != null)
            return decodeURI(r[2]);
        return null;
    }

    $.post("{:url('jingdian/Mqapi/getOrder')}","orderId="+getQueryString("orderId"),function (data) {
        if (data.code==1){
            var time = new Date().getTime()-data.data.date*1000;
            time = time/1000;
            time = data.data.timeOut*60 - time;

            if (data.data.state == -1){
                time = 0;
            }
            timer(time);            
			var p2_Order= data.data.payId;
			var p5_Pid= data.data.param;	
			setCookie("p2_Order",p2_Order,30);
			setCookie("p5_Pid",p5_Pid,30);
			
            if (data.data.payType == 3) {
                data.data.payType1 = "微信";
            }
			if (data.data.payType == 2) {
                data.data.payType1 = "支付宝&微信";
            }
			if (data.data.payType == 1) {
                data.data.payType1 = "支付宝";
            }	
            new Vue({
                el: '#body',
                data: data.data
            })
            check();
        }else{
            timer(0)
        }
    });

    function check() {
        $.post("{:url('jingdian/Mqapi/checkOrder')}","orderId="+getQueryString("orderId"),function (data) {
            if (data.code == 1){
				var p2_Order=getCookie("p2_Order");
				var p5_Pid=getCookie("p5_Pid");
				ajaxstatus(p2_Order,p5_Pid);
                //window.location.href = data.data;
            } else{
                if (data.data == "订单已过期") {
                    intDiff = 0;
                }else{
                    setTimeout("check()",1500);
                }
            }
        })
    }

						function ajaxstatus(p2_Order,p5_Pid) {
							var date = new Date();
							var timer = date.getTime().toString();
							$.ajax({
								url:"{:url('api/pub/checkdingdan')}?mcard="+p2_Order+"&t=" + timer,
								type: "GET",
								dataType: "text",
								success: function(res) {
									if(res == 1) { //订单状态为1表示支付成功     
										documentwrite(p2_Order,p5_Pid);
									}
								  if(res == 3) { //订单状态为1表示支付成功	          
										documentwriteuser(p2_Order);
									}
								},
								error: function() {

								}
							});

						}
						

				function documentwrite(p2_Order,p5_Pid) {

					document.write("你的订单编号是："+p2_Order+"<p><a href={:config('is_https')}://" + window.location.host + "/jingdian/getmail/index.html?mpid="+p5_Pid+"&number="+p2_Order+">支付成功，如5秒内没跳转请点击我</a><script>location.href = \"{:url('@jingdian/Getmail/index')}\"+\"?mpid="+p5_Pid+"&number="+p2_Order+"\";<\/script>");
				}
				function documentwriteuser(p2_Order) {

					document.write("你的订单编号是："+p2_Order+"<p><a href={:config('is_https')}://" + window.location.host + "/jingdian/user/uspaylog.html>支付成功，如5秒内没跳转请点击我</a><script>location.href = \"{:url('@jingdian/user/uscenter')}\"+\"\";<\/script>");
				}
function getCookie(cname){
var name = cname + "=";
var ca = document.cookie.split(';');
for(var i=0; i<ca.length; i++) {
	var c = ca[i].trim();
	if (c.indexOf(name)==0) { return c.substring(name.length,c.length); }
}
return "";
}
function setCookie(cname,cvalue,exdays){
var d = new Date();
d.setTime(d.getTime()+(exdays*24*60*60*1000));
var expires = "expires="+d.toGMTString();
document.cookie = cname+"="+cvalue+"; "+expires;
}
</script>
