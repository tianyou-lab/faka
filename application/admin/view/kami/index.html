{include file="public/header" /}
{literal}<style>

.g-search input:focus{border-color:#2563eb}
.g-btn{height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#fff}
.g-btn-primary{background:#2563eb}.g-btn-primary:hover{background:#1d4ed8;color:#fff}
.g-btn-search{background:#2563eb;color:#fff;border:none;height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer}
.g-btn-danger{background:#ef4444}.g-btn-danger:hover{background:#dc2626;color:#fff}
.g-btn-warn{background:#f59e0b}.g-btn-warn:hover{background:#d97706;color:#fff}
.g-btn-info{background:#3b82f6}.g-btn-info:hover{background:#2563eb;color:#fff}
.g-table-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;overflow-x:auto}
.g-table{width:100%;border-collapse:collapse;font-size:12px}
.g-table th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.g-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
.g-table tr:hover td{background:#f8fafc}
.g-act{padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#475569;transition:all .15s;text-decoration:none;display:inline-block;margin:1px}
.g-act-del{color:#ef4444;border-color:#fecaca}.g-act-del:hover{background:#fef2f2;border-color:#ef4444}

.sk-spinner-three-bounce .sk-bounce1{animation-delay:-.32s}

@keyframes sk-bouncedelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

<body class="gray-bg">
<div class="g-page">

<div class="g-toolbar">
    <a href="{:url('Kami/add_kami')}?id={$goodsid}" class="g-btn g-btn-primary"><i class="fa fa-plus"></i> 添加卡密</a>
    <button class="g-btn g-btn-info" onclick="export_kami()"><i class="fa fa-level-up"></i> 导出卡密</button>
    <div class="g-search">
        <input type="text" id="key" value="{$val}" placeholder="搜索卡密" />
        <input type="hidden" id="mpid" value="{$goodsid}" />
        <button class="g-btn-search" onclick="Ajaxpage()"><i class="fa fa-search"></i> 搜索</button>
    </div>
</div>

<div class="g-table-wrap">
    <div class="g-batch">
        <button class="g-btn g-btn-danger" onclick="del_shopfromchecked()"><i class="fa fa-trash-o"></i> 删除选中</button>
        <button class="g-btn g-btn-info" onclick="del_guoqi({$goodsid})"><i class="fa fa-trash-o"></i> 删除已用</button>
        <button class="g-btn g-btn-warn" onclick="del_all({$goodsid})"><i class="fa fa-trash-o"></i> 删除所有</button>
    </div>
    <table class="g-table">
        <thead>
            <tr>
                <th width="4%"><input type="checkbox" id="all" onclick="checkAll()" />全选</th>
                <th width="6%">状态</th>
                <th>卡密</th>
                <th width="12%">时间</th>
                <th width="8%">操作</th>
            </tr>
        </thead>
        <script id="list-template" type="text/html">
            {{# for(var i=0;i<d.length;i++){  }}
            <tr>
                <td><input type="checkbox" name="checkname[]" value="{{d[i].id}}" />{{d[i].id}}</td>
                <td>
                    {{# if(d[i].mis_use==0){ }}
                    <span style="color:#059669">未提取</span>
                    {{# }else{ }}
                    <span style="color:#ef4444">已提取</span>
                    {{# } }}
                </td>
                <td style="text-align:left;">{{# var str=d[i].musernm }}{{ str.substr(0,100) }}</td>
                <td>{{d[i].create_time}}</td>
                <td><a class="g-act g-act-del" href="javascript:;" onclick="del_kami({{d[i].id}})"><i class="fa fa-trash-o"></i> 删除</a></td>
            </tr>
            {{# } }}
        </script>
        <tbody id="list-content"></tbody>
    </table>
    <div class="g-footer">
        <span class="g-total">共 {$count} 条数据</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <span id="allpage" class="g-total"></span>
            <div id="AjaxPage"></div>
        </div>
    </div>
</div>

</div>

<div class="spiner-example">
    <div class="sk-spinner sk-spinner-three-bounce">
        <div class="sk-bounce1"></div>
        <div class="sk-bounce2"></div>
        <div class="sk-bounce3"></div>
    </div>
</div>

{include file="public/footer" /}

<script type="text/javascript">
var _URL='{:url("Kami/index")}?id={$goodsid}';
var _ALLPAGE='{$allpage}';
var _GOODSID={$goodsid};
</script>
{literal}
<script type="text/javascript">
$('#key').on('keydown',function(e){if(e.keyCode==13){Ajaxpage();return false;}});
Ajaxpage();
function Ajaxpage(curr){
    var key=$('#key').val();
    var mpid=$('#mpid').val();
    $.getJSON(_URL, {page: curr || 1,key:key,mpid:mpid}, function(data){
        $(".spiner-example").css('display','none');
        if(data==''){
            $("#list-content").html('<tr><td colspan="5" class="g-empty">暂无数据</td></tr>');
        }else{
            var tpl = document.getElementById('list-template').innerHTML;
            laytpl(tpl).render(data, function(html){
                document.getElementById('list-content').innerHTML = html;
            });
            laypage({
                cont: $('#AjaxPage'),
                pages: _ALLPAGE,
                skip: true,
                skin: '#2563eb',
                curr: curr || 1,
                groups: 5,
                jump: function(obj, first){
                    if(!first){ Ajaxpage(obj.curr) }
                    $('#allpage').html('第'+ obj.curr +'页 / 共'+ obj.pages +'页');
                }
            });
        }
    });
}

function checkAll(){
    var all=document.getElementById('all');
    var one=document.getElementsByName('checkname[]');
    for(var i=0;i<one.length;i++){ one[i].checked=all.checked; }
}
</script>
{/literal}
<script type="text/javascript">
function del_kami(id){ lunhui.confirm(id,'{:url("del_kami")}'); }

function del_guoqi(id){
    layer.confirm('确认删除过期卡密吗?', {icon:3,title:'提示'}, function(index){
        $.getJSON('{:url("del_guoqi")}', {'mpid':{$goodsid}}, function(res){
            layer.msg(res.msg,{icon:1,time:1000,shade:0.1});
        });
        Ajaxpage();
        layer.close(index);
    });
}

function del_all(id){
    layer.confirm('确认删除所有卡密吗?', {icon:3,title:'提示'}, function(index){
        $.getJSON('{:url("del_all")}', {'mpid':{$goodsid}}, function(res){
            layer.msg(res.msg,{icon:1,time:1000,shade:0.1});
        });
        Ajaxpage();
        layer.close(index);
    });
}

function del_shopfromchecked(){
    layer.confirm('确认删除选中的卡密吗?', {icon:3,title:'提示'}, function(index){
        var one=document.getElementsByName('checkname[]');
        for(var i=0;i<one.length;i++){
            if(one[i].checked==true){
                $.getJSON('{:url("del_kami")}', {'id':one[i].value}, function(res){
                    if(res.code==1){ layer.msg("删除成功",{icon:1,time:1000,shade:0.1}); Ajaxpage(); }
                    else{ layer.msg("删除失败",{icon:2,time:1000,shade:0.1}); }
                });
            }
        }
    });
}

function export_kami(){
    layer.open({
        type:0, anim:3,
        content:'<div class="row"><div class="col-sm-10"><div class="input-group"><span class="input-group-addon">导出数量:</span><input type="text" id="buynum" class="form-control" name="buynum" value=""></div></div></div>',
        title:['导出卡密','font-size:18px;'],
        btn:['确定','取消'],
        btnAlign:'c',
        yes:function(index,layero){
            var buynum=$("#buynum").val();
            location.href="{:url('export_kami')}"+"?mflid={$goodsid}&buynum="+buynum;
            Ajaxpage();
            layer.close(index);
        },
        btn2:function(){ layer.closeAll(); }
    });
}
</script>
</body>
</html>
