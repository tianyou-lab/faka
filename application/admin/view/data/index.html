{include file="public/header" /}
<link href="/static/cdn/iCheck/1.0.2/skins/all.css" rel="stylesheet">
{literal}<style>
.g-page{padding:10px}
.g-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e8e8e8}
.g-btn{height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#fff}
.g-btn-primary{background:#2563eb}.g-btn-primary:hover{background:#1d4ed8;color:#fff}
.g-btn-info{background:#3b82f6}.g-btn-info:hover{background:#2563eb;color:#fff}
.g-btn-danger{background:#ef4444}.g-btn-danger:hover{background:#dc2626;color:#fff}
.g-table-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;overflow-x:auto}
.g-table{width:100%;border-collapse:collapse;font-size:12px}
.g-table th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.g-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
.g-table tr:hover td{background:#f8fafc}
.g-act{padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#475569;transition:all .15s;text-decoration:none;display:inline-block;margin:1px}
.g-act:hover{border-color:#2563eb;color:#2563eb}
.g-act-del{color:#ef4444;border-color:#fecaca}.g-act-del:hover{background:#fef2f2;border-color:#ef4444}
.g-empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">

<div class="g-toolbar">
    <button class="g-btn g-btn-primary" id="export">立即备份</button>
    <button class="g-btn g-btn-info" id="optimize" url="{:url('optimize')}">优化表</button>
    <button class="g-btn g-btn-danger" id="repair" url="{:url('repair')}">修复表</button>
</div>

<div class="g-table-wrap">
    <form id="export-form" method="post" action="{:url('export')}">
    <table class="g-table">
        <thead>
            <tr>
                <th width="4%"><input class="i-checks checkbox check-all" checked="checked" type="checkbox"></th>
                <th>表名</th>
                <th>数据量</th>
                <th>数据大小</th>
                <th>创建时间</th>
                <th>备份状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {notempty name="data"}
                {volist name="data" id="vo"}
                <tr>
                    <td><input class="ids i-checks" checked="checked" type="checkbox" name="ids[]" value="{$vo.name}"></td>
                    <td>{$vo.name}</td>
                    <td>【{$vo.rows}】 条记录</td>
                    <td>{$vo.data_length|format_bytes}</td>
                    <td>{$vo.create_time}</td>
                    <td id="info">等待备份...</td>
                    <td>
                        <a class="g-act" href="{:url('optimize',['ids'=>$vo['name']])}">优化表</a>
                        <a class="g-act g-act-del" href="{:url('repair',['ids'=>$vo['name']])}">修复表</a>
                    </td>
                </tr>
                {/volist}
            {else /}
                <tr><td colspan="7" class="g-empty">暂未发现数据库表!</td></tr>
            {/notempty}
        </tbody>
    </table>
    </form>
</div>

</div>

{include file="public/footer" /}

<script type="text/javascript">
$('.check-all').on('ifChecked', function(event){ $('input[name="ids[]"]').iCheck('check'); });
$('.check-all').on('ifUnchecked', function(event){ $('input[name="ids[]"]').iCheck('uncheck'); });

$(function(){
    (function($){
        var $form = $("#export-form"), $export = $("#export"), tables, $optimize = $("#optimize"), $repair = $("#repair");
        $optimize.add($repair).click(function(){
            $.post($(this).attr('url'), $form.serialize(), function(data){
                if(data.code){ layer.msg(data.msg,{icon:1,time:2000,shade:0.1}); }
                else{ layer.msg(data.msg,{icon:2,time:2000,shade:0.1}); }
            });
            return false;
        });

        $export.click(function(){
            $export.parent().children().prop('disabled', true);
            $export.html("正在发送备份请求...");
            $.post($form.attr("action"), $form.serialize(), function(data){
                if(data.code){
                    tables = data.data.tables;
                    $export.html(data.msg + "开始备份，请不要关闭本页面！");
                    backup(data.data.tab);
                    window.onbeforeunload = function(){ return "正在备份数据库，请不要关闭！"; };
                }else{
                    layer.msg(data.msg,{icon:2,time:2000,shade:0.1});
                    $export.html("立即备份");
                    setTimeout(function(){ $export.parent().children().prop('disabled', false); }, 1500);
                }
            });
            return false;
        });

        function backup(tab, status){
            status && showmsg(tab.id, "开始备份...(0%)");
            $.get($form.attr("action"), tab, function(data){
                if(data.code){
                    showmsg(tab.id, data.msg);
                    if(!$.isPlainObject(data.data.tab)){
                        $export.parent().children().prop('disabled', false);
                        $export.html("备份完成，点击重新备份");
                        window.onbeforeunload = function(){ return null; };
                        return;
                    }
                    backup(data.data.tab, tab.id != data.data.tab.id);
                }else{
                    layer.msg(data.msg, 0);
                    $export.html("立即备份");
                    setTimeout(function(){ $export.parent().children().prop('disabled', false); }, 1500);
                }
            });
        }

        function showmsg(id, msg){
            $form.find("input[value=" + tables[id] + "]").closest("tr").find("#info").html(msg);
        }
    })(jQuery);
});
</script>
</body>
</html>
