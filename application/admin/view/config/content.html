{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-form-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;padding:20px}
.g-form-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e8e8e8}
.g-hint{font-size:11px;color:#94a3b8;margin-top:4px}
.g-hint i{margin-right:3px}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">
<div class="g-form-wrap">
    <div class="g-form-title">内容配置</div>
    <form action="{:url('save')}" method="post" class="form-horizontal">
        <div class="form-group">
            <label class="col-sm-2 control-label">后台每页记录数：</label>
            <div class="input-group col-sm-4">
                <input type="text" class="form-control" name="config[list_rows]" value="{$config.list_rows}">
                <div class="g-hint"><i class="fa fa-info-circle"></i>后台数据每页显示记录数</div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-2 control-label">订单查询支持字段：</label>
            <div class="input-group col-sm-4">
                <div class="checkbox i-checks">
                    <input type="checkbox" name='config[select_mcard]' {if condition="$config['select_mcard'] eq 1"}value="1" checked="checked"{/if} />订单号&nbsp;&nbsp;
                    <input type="checkbox" name='config[select_mobile]' {if condition="$config['select_mobile'] eq 1"}value="1" checked="checked"{/if} />联系手机
                    <input type="checkbox" name='config[select_cookie]' {if condition="$config['select_cookie'] eq 1"}value="1" checked="checked"{/if} />本地缓存
                </div>
                <div class="g-hint"><i class="fa fa-info-circle"></i>订单查询支持的字段</div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <div class="col-sm-4 col-sm-offset-3">
                <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> 保存信息</button>&nbsp;&nbsp;&nbsp;
                <a class="btn btn-danger" href="javascript:history.go(-1);"><i class="fa fa-close"></i> 返回</a>
            </div>
        </div>
    </form>
</div>
</div>
{include file="public/footer" /}
</body>
</html>
