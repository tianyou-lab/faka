{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-form-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;padding:20px}
.g-form-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e8e8e8}
.g-hint{font-size:11px;color:#94a3b8;margin-top:4px}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">
<div class="g-form-wrap">
    <div class="g-form-title">编辑菜单</div>
    <form class="form-horizontal m-t" name="edit_rule" id="edit_rule" method="post" action="{:url('edit_rule')}">
        <input type="hidden" name="id" value="{$menu.id}">
        <div class="form-group">
            <label class="col-sm-3 control-label">菜单名称：</label>
            <div class="input-group col-sm-4">
                <input id="title" type="text" class="form-control" name="title" required="" aria-required="true" value="{$menu.title}">
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">节点：</label>
            <div class="input-group col-sm-4">
                <input type="text" name="name" id="name" value="{$menu.name}" placeholder="模块/控制器/方法" class="form-control" />
                <div class="g-hint">如：admin/user/adduser</div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">样式名称：</label>
            <div class="input-group col-sm-4">
                <input type="text" name="css" id="css" value="{$menu.css}" placeholder="输入样式名称" class="form-control" />
                <div class="g-hint"><a href="http://fontawesome.dashgame.com/" target="_black">选择图标</a> 如:fa fa-user</div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状&nbsp;态：</label>
            <div class="input-group col-sm-4">
                <div class="radio i-checks">
                    <input type="radio" name='status' value="1" {if condition="$menu['status'] eq 1 "}checked{/if}/>开启&nbsp;&nbsp;
                    <input type="radio" name='status' value="0" {if condition="$menu['status'] eq 0 "}checked{/if}/>关闭
                </div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="input-group col-sm-5">
                <input type="text" name="sort" id="sort" value="{$menu.sort}" placeholder="输入排序" class="form-control" />
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <div class="col-sm-4 col-sm-offset-3">
                <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> 保存</button>&nbsp;&nbsp;&nbsp;
                <a class="btn btn-danger" href="javascript:history.go(-1);"><i class="fa fa-close"></i> 返回</a>
            </div>
        </div>
    </form>
</div>
</div>
{include file="public/footer" /}
<script type="text/javascript">
$(function(){
    $('#edit_rule').ajaxForm({
        beforeSubmit: function(){
            if(''==$.trim($('#title').val())){ layer.msg('请输入菜单名称',{icon:2,time:1500,shade:0.1}); return false; }
            if(''==$.trim($('#name').val())){ layer.msg('控制器/方法不能为空',{icon:0,time:1500,shade:0.1}); return false; }
        },
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1},function(){ window.location.href="{:url('menu/index')}"; });
            }else{
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1}); return false;
            }
        },
        dataType:'json'
    });
    var elem = document.querySelector('.js-switch');
    if(elem){ var switchery = new Switchery(elem, {color:'#1AB394'}); }
    var config = {'.chosen-select':{}};
    for(var selector in config){ $(selector).chosen(config[selector]); }
});
</script>
</body>
</html>
