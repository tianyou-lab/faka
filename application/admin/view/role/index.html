{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e8e8e8}
.g-search{display:flex;align-items:center;gap:6px;flex:1;min-width:220px}
.g-search input{height:30px;border:1px solid #d9d9d9;border-radius:4px;padding:0 8px;font-size:12px;flex:1;min-width:160px;outline:none;transition:border .2s}
.g-search input:focus{border-color:#2563eb}
.g-btn{height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#fff}
.g-btn-primary{background:#2563eb}.g-btn-primary:hover{background:#1d4ed8;color:#fff}
.g-btn-search{background:#2563eb;color:#fff;border:none;height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer}
.g-table-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;overflow-x:auto}
.g-table{width:100%;border-collapse:collapse;font-size:12px}
.g-table th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.g-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
.g-table tr:hover td{background:#f8fafc}
.g-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer}
.g-tag-on{background:#dcfce7;color:#166534}.g-tag-off{background:#fee2e2;color:#991b1b}
.g-act{padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#475569;transition:all .15s;text-decoration:none;display:inline-block;margin:1px}
.g-act:hover{border-color:#2563eb;color:#2563eb}
.g-act-del{color:#ef4444;border-color:#fecaca}.g-act-del:hover{background:#fef2f2;border-color:#ef4444}
.g-act-success{color:#059669;border-color:#a7f3d0}.g-act-success:hover{background:#ecfdf5;border-color:#059669}
.g-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#fff;border-radius:0 0 6px 6px;border-top:1px solid #e8e8e8}
.g-total{font-size:13px;color:#64748b}
.g-empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
.spiner-example{text-align:center;padding:60px}
.sk-spinner-three-bounce .sk-bounce1,.sk-spinner-three-bounce .sk-bounce2,.sk-spinner-three-bounce .sk-bounce3{width:12px;height:12px;background:#2563eb;border-radius:50%;display:inline-block;animation:sk-bouncedelay 1.4s infinite ease-in-out both}
.sk-spinner-three-bounce .sk-bounce1{animation-delay:-.32s}
.sk-spinner-three-bounce .sk-bounce2{animation-delay:-.16s}
@keyframes sk-bouncedelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">

<div class="g-toolbar">
    <a href="{:url('roleAdd')}" class="g-btn g-btn-primary"><i class="fa fa-plus"></i> 添加角色</a>
    <div class="g-search">
        <input type="text" id="key" value="{$val}" placeholder="搜索角色名" />
        <button class="g-btn-search" onclick="Ajaxpage()"><i class="fa fa-search"></i> 搜索</button>
    </div>
</div>

<div class="g-table-wrap">
    <table class="g-table">
        <thead>
            <tr>
                <th width="5%">ID</th>
                <th>角色名称</th>
                <th width="8%">状态</th>
                <th width="15%">添加时间</th>
                <th width="15%">更新时间</th>
                <th width="20%">操作</th>
            </tr>
        </thead>
        <script id="list-template" type="text/html">
            {{# for(var i=0;i<d.length;i++){  }}
            <tr>
                <td style="color:#94a3b8">{{d[i].id}}</td>
                <td>{{d[i].title}}</td>
                <td>
                    {{# if(d[i].id!==1){ }}
                        {{# if(d[i].status==1){ }}
                        <a href="javascript:;" onclick="role_state({{d[i].id}})"><span class="g-tag g-tag-on">开启</span></a>
                        {{# }else{ }}
                        <a href="javascript:;" onclick="role_state({{d[i].id}})"><span class="g-tag g-tag-off">禁用</span></a>
                        {{# } }}
                    {{# } }}
                </td>
                <td>{{d[i].create_time}}</td>
                <td>{{d[i].update_time}}</td>
                <td>
                    {{# if(d[i].id!==1){ }}
                    <a class="g-act g-act-success" href="javascript:;" onclick="giveQx({{d[i].id}})"><i class="fa fa-key"></i> 权限</a>
                    <a class="g-act" href="javascript:;" onclick="roleEdit({{d[i].id}})"><i class="fa fa-paste"></i> 编辑</a>
                    <a class="g-act g-act-del" href="javascript:;" onclick="roleDel({{d[i].id}})"><i class="fa fa-trash-o"></i> 删除</a>
                    {{# } }}
                </td>
            </tr>
            {{# } }}
        </script>
        <tbody id="list-content"></tbody>
    </table>
    <div class="g-footer">
        <span class="g-total" id="allpage"></span>
        <div id="AjaxPage"></div>
    </div>
</div>

</div>

<div class="spiner-example">
    <div class="sk-spinner sk-spinner-three-bounce">
        <div class="sk-bounce1"></div>
        <div class="sk-bounce2"></div>
        <div class="sk-bounce3"></div>
    </div>
</div>

<div class="zTreeDemoBackground left" style="display:none" id="role">
    <input type="hidden" id="nodeid">
    <div class="form-group">
        <div class="col-sm-5 col-sm-offset-2">
            <ul id="treeType" class="ztree"></ul>
        </div>
    </div>
    <div class="form-group">
        <div class="col-sm-4 col-sm-offset-4" style="margin-bottom:15px">
            <input type="button" value="确认分配" class="btn btn-primary" id="postform"/>
        </div>
    </div>
</div>

{include file="public/footer" /}
<link rel="stylesheet" href="/static/admin/js/plugins/zTree/zTreeStyle.css" type="text/css">
<script type="text/javascript" src="/static/admin/js/plugins/zTree/jquery.ztree.core-3.5.js"></script>
<script type="text/javascript" src="/static/admin/js/plugins/zTree/jquery.ztree.excheck-3.5.js"></script>
<script type="text/javascript" src="/static/admin/js/plugins/zTree/jquery.ztree.exedit-3.5.js"></script>

<script type="text/javascript">
var _URL='{:url("Role/index")}';
var _ALLPAGE='{$allpage}';
var _URL_DEL='{:url("roleDel")}';
var _URL_STATE='{:url("role_state")}';
</script>
{literal}
<script type="text/javascript">
$('#key').on('keydown',function(e){if(e.keyCode==13){Ajaxpage();return false;}});
Ajaxpage();
function Ajaxpage(curr){
    var key=$('#key').val();
    $.getJSON(_URL, {page: curr || 1,key:key}, function(data){
        $(".spiner-example").css('display','none');
        if(data==''){
            $("#list-content").html('<tr><td colspan="6" class="g-empty">暂无数据</td></tr>');
        }else{
            var tpl = document.getElementById('list-template').innerHTML;
            laytpl(tpl).render(data, function(html){
                document.getElementById('list-content').innerHTML = html;
            });
            laypage({
                cont: $('#AjaxPage'),
                pages: _ALLPAGE,
                skip: true,
                skin: '#2563eb',
                curr: curr || 1,
                groups: 5,
                jump: function(obj, first){
                    if(!first){ Ajaxpage(obj.curr) }
                    $('#allpage').html('第'+ obj.curr +'页 / 共'+ obj.pages +'页');
                }
            });
        }
    });
}
function roleEdit(id){ location.href = './roleEdit/id/'+id+'.html'; }
function roleDel(id){ lunhui.confirm(id,_URL_DEL); }
function role_state(id){ lunhui.status(id,_URL_STATE); }

var zNodes = '';
var index = '';
var index2 = '';
function giveQx(id){
    $("#nodeid").val(id);
    index2 = layer.load(0, {shade:false});
    $.getJSON('./giveAccess', {'type':'get','id':id}, function(res){
        layer.close(index2);
        if(res.code == 1){
            zNodes = JSON.parse(res.data);
            index = layer.open({
                type:1,
                area:['350px','80%'],
                title:'权限分配',
                skin:'layui-layer-demo',
                content:$('#role')
            });
            var setting = { check:{enable:true}, data:{simpleData:{enable:true}} };
            $.fn.zTree.init($("#treeType"), setting, zNodes);
            var zTree = $.fn.zTree.getZTreeObj("treeType");
            zTree.expandAll(true);
        }else{
            layer.alert(res.msg);
        }
    });
}

$("#postform").click(function(){
    var zTree = $.fn.zTree.getZTreeObj("treeType");
    var nodes = zTree.getCheckedNodes(true);
    var NodeString = '';
    $.each(nodes, function(n, value){
        if(n>0) NodeString += ',';
        NodeString += value.id;
    });
    var id = $("#nodeid").val();
    $.post('./giveAccess', {'type':'give','id':id,'rule':NodeString}, function(res){
        layer.close(index);
        if(res.code == 1){
            layer.msg(res.msg,{icon:1,time:1500,shade:0.1}, function(){ Ajaxpage(1) });
        }else{
            layer.msg(res.msg);
        }
    }, 'json');
});
</script>
{/literal}
</body>
</html>
