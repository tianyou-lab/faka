{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-form-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;padding:20px}
.g-form-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e8e8e8}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">
<div class="g-form-wrap">
    <div class="g-form-title">编辑角色</div>
    <form class="form-horizontal" name="roleEdit" id="roleEdit" method="post" action="{:url('roleEdit')}">
        <input type="hidden" value="{$role.id}" name="id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label">角色名称：</label>
            <div class="input-group col-sm-4">
                <input id="title" type="text" class="form-control" name="title" value="{$role.title}">
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状&nbsp;态：</label>
            <div class="col-sm-6">
                <div class="radio i-checks">
                    <input type="radio" name='status' value="1" {if condition="$role['status'] eq 1 "}checked{/if}/>开启&nbsp;&nbsp;
                    <input type="radio" name='status' value="0" {if condition="$role['status'] eq 0 "}checked{/if}/>关闭
                </div>
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <div class="col-sm-4 col-sm-offset-3">
                <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> 保存</button>&nbsp;&nbsp;&nbsp;
                <a class="btn btn-danger" href="javascript:history.go(-1);"><i class="fa fa-close"></i> 返回</a>
            </div>
        </div>
    </form>
</div>
</div>
{include file="public/footer" /}
<script type="text/javascript">
$(function(){
    $('#roleEdit').ajaxForm({
        beforeSubmit: function(){
            if(''==$.trim($('#title').val())){ layer.msg('请输入角色名称',{icon:2,time:1500,shade:0.1}); return false; }
        },
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1},function(){ window.location.href="{:url('role/index')}"; });
            }else{
                layer.msg(data.msg,{icon:5,time:1500,shade:0.1}); return false;
            }
        },
        dataType:'json'
    });
    var elem = document.querySelector('.js-switch');
    if(elem){ var switchery = new Switchery(elem, {color:'#1AB394'}); }
    var config = {'.chosen-select':{}};
    for(var selector in config){ $(selector).chosen(config[selector]); }
});
</script>
</body>
</html>
