{include file="public/header" /}
<link rel="stylesheet" type="text/css" href="/static/cdn/layui/v2.4.5/css/layui.css?v=201811010202">
{literal}<style>
.g-page{padding:10px}
.g-form-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;padding:20px}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">
<div class="g-form-wrap">
<div class="layui-form" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">收款方式</label>
        <div class="layui-input-block">
            <div class="layui-upload">
                <select id="type">
                    <option value="1">支付宝</option>
                    <option value="2">聚合支付</option>
                    <option value="3">微信</option>
                </select>
            </div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">解码后的url</label>
        <div class="layui-input-block">
            <input type="text" id="url" lay-verify="required" placeholder="收款码解码后的url" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">金额</label>
        <div class="layui-input-block">
            <input type="text" id="money" lay-verify="required" placeholder="金额" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item" style="text-align:left;">
        <button class="layui-btn" onclick="window.open('https://jiema.wwei.cn')">收款码解码地址</button>
    </div>
    <div class="layui-form-item" style="text-align:right;">
        <button class="layui-btn" onclick="save()">保存</button>
    </div>
</div>
</div>
</div>

<script src="/static/cdn/layui/v2.4.5/layui.js?v=201811010202"></script>
<script src="/static/cdn/jquery/2.1.4/jquery.min.js"></script>
<script>
layui.use(['form','layer'], function(){
    var table = layui.table, form = layui.form;
    form.render();
});

function save() {
    var type = $("#type").val();
    var money = $("#money").val();
    var url = $("#url").val();
    if (type == ""){ layer.msg("请选择收款码类型"); return; }
    if (money == ""){ layer.msg("请输入收款码金额"); return; }
    if (url == ""){ layer.msg("请输入收款码URL"); return; }
    $.post("addPayQrcode","type="+type+"&price="+money+"&pay_url="+encodeURIComponent(url),function(data){
        layer.msg(data.msg);
    });
}
</script>
</body>
</html>
