{include file="public/header" /}
<link rel="stylesheet" type="text/css" href="/static/cdn/layui/v2.4.5/css/layui.css?v=201811010202">
{literal}<style>
.g-page{padding:10px}
.layui-table-cell{height:auto}
.layui-table img{max-width:200px}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">

<div class="layui-form layui-form-pane" action="">
<div class="layui-form-item">
    <div class="layui-inline">
        <label class="layui-form-label">支付方式</label>
        <div class="layui-input-inline">
            <select id="type" lay-verify="required" lay-filter="type">
                <option value="">不限制</option>
                <option value="1">支付宝</option>
                <option value="3">微信</option>
                <option value="2">聚合支付</option>
            </select>
        </div>
    </div>
</div>
</div>

<table id="demo" lay-filter="test"></table>

</div>

<script src="/static/cdn/layui/v2.4.5/layui.js?v=201811010202"></script>
<script src="/static/cdn/jquery/2.1.4/jquery.min.js"></script>
<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>
<script>
var myTable,table,form;
layui.use(['form','table','laydate'], function(){
    table = layui.table;
    form = layui.form;

    myTable = table.render({
        elem: '#demo'
        ,height: 'full-130'
        ,url: 'getPayQrcodes'
        ,where: { type:$("#type").val() }
        ,cols: [[
            {field:'state', title:'二维码', templet:function(d){
                var emw = "{:url('@jingdian/Qr')}?size=100&text=";
                return '<img src="'+emw+d.pay_url+'"/>';
            }},
            {field:'type', title:'类型', templet:function(d){
                if(d.type=="3") return '微信';
                else if(d.type=="1") return '支付宝';
                else return '聚合支付';
            }},
            {field:'price', title:'金额'},
            {title:"操作", width:70, align:'center', toolbar:'#barDemo'}
        ]]
        ,page:true
    });

    form.on('select(type)', function(data){
        myTable.reload({ where: { type:$("#type").val() } });
    });

    table.on('tool(test)', function(obj){
        var data = obj.data, layEvent = obj.event;
        if(layEvent === 'del'){
            layer.confirm('要删除该二维码么？', function(index){
                layer.close(index);
                $.post("delPayQrcode","id="+data.id,function(data){
                    if(data.code==1){ obj.del(); }
                    layer.msg(data.msg);
                });
            });
        }
    });

    form.render();
});
</script>
</body>
</html>
