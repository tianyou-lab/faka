{literal}<style>

.ord-btn:hover{border-color:#2563eb;color:#2563eb}

.ord-s-unextracted{background:#fef3c7;color:#92400e}

.sk-spinner-three-bounce .sk-bounce1,.sk-spinner-three-bounce .sk-bounce2,.sk-spinner-three-bounce .sk-bounce3{width:12px;height:12px;background:#2563eb;border-radius:50%;display:inline-block;animation:sk-bouncedelay 1.4s infinite ease-in-out both}
.sk-spinner-three-bounce .sk-bounce1{animation-delay:-.32s}
.sk-spinner-three-bounce .sk-bounce2{animation-delay:-.16s}
@keyframes sk-bouncedelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
{/literal}
<body class="gray-bg">
<div class="ord-page">

<!-- 搜索与筛选 -->
<div class="ord-toolbar">
    <div class="ord-search">
        <input type="text" id="key" value="{$val}" placeholder="搜索订单号 / 购买账号 / 联系方式" />
        <button type="button" onclick="Ajaxpage()"><i class="fa fa-search"></i> 搜索</button>
    </div>
    <div class="ord-filters">
        <select class="ord-sel" id="type">
            <option value="999" {if condition="$type eq 999"}selected{/if}>全部类型</option>
            <option value="888" {if condition="$type eq 888"}selected{/if}>自动发货</option>
            <option value="1" {if condition="$type eq 1"}selected{/if}>手动发货</option>
        </select>
        <button class="ord-btn ord-btn-export" onclick="export_order()"><i class="fa fa-download"></i> 导出</button>
    </div>
</div>

<!-- 状态标签筛选 -->
<div class="ord-status-tabs">
    <span class="ord-status-tab active" data-status="" onclick="filterStatus(this)">全部</span>
    <span class="ord-status-tab" data-status="0" onclick="filterStatus(this)">未提取/已付款</span>
    <span class="ord-status-tab" data-status="1" onclick="filterStatus(this)">已提取/已下单</span>
    <span class="ord-status-tab" data-status="2" onclick="filterStatus(this)">未付款</span>
    <span class="ord-status-tab" data-status="3" onclick="filterStatus(this)">进行中</span>
    <span class="ord-status-tab" data-status="4" onclick="filterStatus(this)">已撤回</span>
    <span class="ord-status-tab" data-status="5" onclick="filterStatus(this)">已完成</span>
</div>
<input type="hidden" id="mstatus" value="{$mstatus}" />

<!-- 批量操作 -->
<div class="ord-actions">
    <button class="ord-act ord-act-del" onclick="del_order()"><i class="fa fa-trash-o"></i> 删除</button>
    <button class="ord-act ord-act-ing" onclick="mstatus(3)"><i class="fa fa-spinner"></i> 进行中</button>
    <button class="ord-act ord-act-back" onclick="mstatus(4)"><i class="fa fa-undo"></i> 撤回</button>
    <button class="ord-act ord-act-done" onclick="mstatus(5)"><i class="fa fa-check"></i> 完成</button>
</div>

<!-- 表格 -->
<div class="ord-table-wrap">
    <table class="ord-table">
        <thead>
            <tr>
                <th class="ord-cb"><input type="checkbox" id="all" onclick="checkAll()" /></th>
                <th>订单号</th>
                <th>金额</th>
                <th>类型</th>
                <th>商品</th>
                <th>状态</th>
                <th>支付方式</th>
                <th>买家</th>
                <th>来源</th>
                <th>创建时间</th>
                <th>更新时间</th>
            </tr>
        </thead>
        <script id="list-template" type="text/html">
            {{# for(var i=0;i<d.length;i++){  }}
            <tr class="item-order">
                <td class="ord-cb">
                    <input type="checkbox" name="checkname[]" value="{{d[i].id}}" />
                </td>
                <td style="display:none;" class="hidden-number">{{removeHTMLTag(htmlspecialchars_decode(d[i].mcard))}}</td>
                <td style="display:none;" class="hidden-detail">
                    {{# if(d[i].lianxi){ }}tel:{{d[i].lianxi}}{{# } }}
                    {{# if(d[i].email){ }}mail:{{d[i].email}}{{# } }}
                    {{# if(d[i].statustext){ }}状态信息：{{d[i].statustext}}{{# } }}
                    {{# if(d[i].beizhu){ }}后台备注：{{d[i].beizhu}}{{# } }}
                    【{{d[i].mnamebie}}】
                </td>
                <td>
                    {{# if(d[i].type==0){ }}
                    <a class="ord-link" target="_blank" href="/jingdian/index/fenxiang/order/{{d[i].mcard}}.html">{{removeHTMLTag(htmlspecialchars_decode(d[i].mcard))}}</a>
                    {{# }else{ }}
                    <a class="ord-link" target="_blank" href="/jingdian/order/getorderdetailbyorder.html?number={{d[i].mcard}}">{{removeHTMLTag(htmlspecialchars_decode(d[i].mcard))}}</a>
                    {{# } }}
                    <div class="ord-id">#{{d[i].id}}</div>
                </td>
                <td><span class="ord-amount">¥{{d[i].mamount}}</span></td>
                <td>
                    {{# if(d[i].type==0){ }}
                    <span class="ord-tag ord-tag-auto">自动</span>
                    {{# }else{ }}
                    <span class="ord-tag ord-tag-manual">手动</span>
                    {{# } }}
                </td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="{{d[i].mnamebie}}">{{d[i].mnamebie}}</td>
                <td>
                    {{# if(d[i].type==0){ }}
                        {{# if(d[i].mstatus==0){ }}<span class="ord-tag ord-s-unextracted">未提取</span>
                        {{# }else if(d[i].mstatus==1){ }}<span class="ord-tag ord-s-extracted">已提取</span>
                        {{# }else if(d[i].mstatus==2){ }}<span class="ord-tag ord-s-unpaid">未付款</span>
                        {{# }else{ }}<span class="ord-tag ord-s-unknown">未知</span>{{# } }}
                    {{# }else if(d[i].type==1){ }}
                        {{# if(d[i].mstatus==0){ }}<span class="ord-tag ord-s-paid">已付款</span>
                        {{# }else if(d[i].mstatus==1){ }}<span class="ord-tag ord-s-ordered">已下单</span>
                        {{# }else if(d[i].mstatus==2){ }}<span class="ord-tag ord-s-unpaid">未付款</span>
                        {{# }else if(d[i].mstatus==3){ }}<span class="ord-tag ord-s-progress">进行中</span>
                        {{# }else if(d[i].mstatus==4){ }}<span class="ord-tag ord-s-revoked">已撤回</span>
                        {{# }else if(d[i].mstatus==5){ }}<span class="ord-tag ord-s-done">已完成</span>
                        {{# }else{ }}<span class="ord-tag ord-s-unknown">未知</span>{{# } }}
                    {{# }else{ }}
                        <span class="ord-tag ord-s-unknown">{{d[i].mstatus}}</span>
                    {{# } }}
                </td>
                <td><span class="ord-pay">
                    {{# if(d[i].maddtype==0){ }}积分兑换
                    {{# }else if(d[i].maddtype==1){ }}管理员
                    {{# }else if(d[i].maddtype==2){ }}支付宝
                    {{# }else if(d[i].maddtype==3){ }}微信
                    {{# }else if(d[i].maddtype==4){ }}云闪付
                    {{# }else if(d[i].maddtype==5){ }}余额
                    {{# }else if(d[i].maddtype==6){ }}QQ钱包
                    {{# }else if(d[i].maddtype==7){ }}财付通
                    {{# }else{ }}--{{# } }}
                </span></td>
                <td><span class="ord-account">{{# if(d[i].memberid==0){ }}非会员{{# }else{ }}{{d[i].account}}{{# } }}</span></td>
                <td><span class="ord-account">{{# if(d[i].childid==0){ }}主站{{# }else{ }}{{d[i].fzhost}}{{# } }}</span></td>
                <td><span class="ord-time">{{d[i].create_time}}</span></td>
                <td><span class="ord-time">{{d[i].update_time}}</span></td>
            </tr>
            {{# } }}
        </script>
        <tbody id="list-content"></tbody>
    </table>
    <div class="ord-footer">
        <span class="ord-total">共 {$count} 条数据</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <span id="allpage" class="ord-total"></span>
            <div id="AjaxPage"></div>
        </div>
    </div>
</div>

</div>

<!-- 加载动画 -->
<div class="spiner-example">
    <div class="sk-spinner sk-spinner-three-bounce">
        <div class="sk-bounce1"></div>
        <div class="sk-bounce2"></div>
        <div class="sk-bounce3"></div>
    </div>
</div>

{include file="public/footer" /}

<script type="text/javascript">
var _URL_ORDER_INDEX='{:url("Order/index")}';
var _URL_ORDER_ATTACH='{:url("Order/getOrderAttach")}';
var _URL_UPDATE_ORDER='{:url("UpdateOrder")}';
var _URL_DEL_ORDER='{:url("del_order")}';
var _URL_EXPORT='{:url("export")}';
var _ALLPAGE='{$allpage}';
</script>
{literal}
<script type="text/javascript">

function filterStatus(el){
    $('.ord-status-tab').removeClass('active');
    $(el).addClass('active');
    $('#mstatus').val($(el).data('status'));
    Ajaxpage();
}

function Init(){
    $('.item-order').click(function(){
        var val = $(this).children(".hidden-detail").html();
        var number = $(this).children(".hidden-number").html();
        $.getJSON(_URL_ORDER_ATTACH, {number: number}, function(data){
            var htmlString ='';
            for(var i=0; i<data.length; i++){
                htmlString += '<b>'+data[i].title +'</b>：'+data[i].text+'<br>';
            }
            if(val.replace(/\s+/g,"")!=="") {
                layer.closeAll('page');
                window.index = layer.open({
                    type: 1,
                    title: number+" 订单详情",
                    closeBtn: 1,
                    shade: 0.3,
                    area: ['420px', 'auto'],
                    anim: 2,
                    content: '<div style="padding:20px;line-height:1.8;font-size:13px">'+ htmlString + val + '</div>'
                });
            }
        });
    });
}

Ajaxpage();
function Ajaxpage(curr){
    var key=$('#key').val();
    var selected=$('#type option:selected').val();
    var mstatus=$('#mstatus').val();
    $.getJSON(_URL_ORDER_INDEX, {page: curr || 1,key:key,type:selected,mstatus:mstatus}, function(data){
        $(".spiner-example").css('display','none');
        if(data==''){
            $("#list-content").html('<tr><td colspan="11" class="ord-empty">暂无订单数据</td></tr>');
        }else{
            var tpl = document.getElementById('list-template').innerHTML;
            laytpl(tpl).render(data, function(html){
                document.getElementById('list-content').innerHTML = html;
            });
            laypage({
                cont: $('#AjaxPage'),
                pages: _ALLPAGE,
                skip: true,
                skin: '#2563eb',
                curr: curr || 1,
                groups: 5,
                jump: function(obj, first){
                    if(!first){
                        Ajaxpage(obj.curr)
                    }
                    Init();
                    $('#allpage').html('第'+ obj.curr +'页 / 共'+ obj.pages +'页');
                }
            });
        }
    });
}

// 回车搜索
$('#key').on('keydown',function(e){if(e.keyCode==13){Ajaxpage();return false;}});
// 类型筛选
$('#type').on('change',function(){Ajaxpage();});

function checkAll(){
    var all=document.getElementById('all');
    var one=document.getElementsByName('checkname[]');
    for(var i=0;i<one.length;i++){one[i].checked=all.checked;}
}

function mstatus(status){
    layer.open({
        type: 0, anim: 2,
        content: '<div style="padding:10px">'
            +'<div style="margin-bottom:10px"><label style="font-size:13px;font-weight:600;margin-bottom:4px;display:block">状态信息</label>'
            +'<textarea id="statustext" style="width:100%;height:60px;border:1px solid #d9d9d9;border-radius:4px;padding:8px;font-size:13px;resize:vertical" placeholder="手工类订单回执可见"></textarea></div>'
            +'<div><label style="font-size:13px;font-weight:600;margin-bottom:4px;display:block">操作备注</label>'
            +'<textarea id="beizhu" style="width:100%;height:60px;border:1px solid #d9d9d9;border-radius:4px;padding:8px;font-size:13px;resize:vertical" placeholder="仅后台可见"></textarea></div>'
            +'</div>',
        title: ['修改订单状态', 'font-size:16px;'],
        btn: ['保存', '取消'],
        btnAlign: 'c',
        yes: function(index){
            var one=document.getElementsByName('checkname[]');
            var statustext=$("#statustext").val();
            var beizhu=$("#beizhu").val();
            for(var i=0;i<one.length;i++){
                if(one[i].checked==true){
                    $.getJSON(_URL_UPDATE_ORDER, {'id':one[i].value,'mstatus':status,'statustext':statustext,'beizhu':beizhu}, function(res){
                        if(res.code==1){layer.msg('更改成功',{icon:1,time:1000,shade:0.1});}
                        else{layer.msg(res.msg,{icon:5,time:1000,shade:0.1});}
                    });
                }
            }
            Ajaxpage();
            layer.close(index);
        },
        btn2: function(){layer.closeAll();}
    });
}

function export_order(){location.href=_URL_EXPORT;}

function del_order(){
    layer.confirm('确认删除选中的订单吗?', {icon:3,title:'提示'}, function(index){
        var one=document.getElementsByName('checkname[]');
        for(var i=0;i<one.length;i++){
            if(one[i].checked==true){
                $.getJSON(_URL_DEL_ORDER, {'id':one[i].value}, function(res){
                    if(res.code==1){layer.msg("删除成功",{icon:1,time:1000,shade:0.1});Ajaxpage();}
                    else{layer.msg("删除失败",{icon:2,time:1000,shade:0.1});}
                });
            }
        }
    })
}

function removeHTMLTag(str){
    str=str.replace(/<(style|script|iframe)[^>]*?>[\s\S]+?<\/\1\s*>/gi,'').replace(/<[^>]+?>/g,'').replace(/\s+/g,' ').replace(/ /g,' ').replace(/>/g,' ');
    str=str.replace(/[ | ]*\n/g,'\n');
    str=str.replace(/&nbsp;/ig,'');
    return str;
}
function htmlspecialchars(str){
    var s="";if(str.length==0)return"";
    for(var i=0;i<str.length;i++){switch(str.substr(i,1)){case"<":s+="&lt;";break;case">":s+="&gt;";break;case"&":s+="&amp;";break;case" ":if(str.substr(i+1,1)==" "){s+=" &nbsp;";i++;}else s+=" ";break;case"\"":s+="&quot;";break;case"\n":s+="<br>";break;default:s+=str.substr(i,1);break;}}
    return s;
}
function htmlspecialchars_decode(str){
    str=str.replace(/&amp;/g,'&');str=str.replace(/&lt;/g,'<');str=str.replace(/&gt;/g,'>');str=str.replace(/&quot;/g,"''");str=str.replace(/&#039;/g,"'");
    return str;
}

</script>
{/literal}
</body>
</html>
