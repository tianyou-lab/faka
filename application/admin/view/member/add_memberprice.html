{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-form-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;padding:20px}
.g-form-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e8e8e8}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">
<div class="g-form-wrap">
    <div class="g-form-title">添加会员私密价格</div>
    <form class="form-horizontal" name="add_memberprice" id="add_memberprice" method="post" action="{:url('add_memberprice')}">
        <div class="form-group">
            <label class="col-sm-3 control-label">商品名称：</label>
            <div class="input-group col-sm-4">
                <input id="goodname" readonly="readonly" type="text" class="form-control" value="{:htmlspecialchars_decode($category['mname'])}">
            </div>
            <input type="hidden" name="goodid" value="{$id}">
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">会员名称：</label>
            <div class="input-group col-sm-4">
                <input id="account" type="text" class="form-control" name="account">
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <label class="col-sm-3 control-label">价格(元)：</label>
            <div class="input-group col-sm-4">
                <input id="price" type="number" class="form-control" name="price" step="0.0001">
            </div>
        </div>
        <div class="hr-line-dashed"></div>
        <div class="form-group">
            <div class="col-sm-4 col-sm-offset-3">
                <button class="btn btn-primary" type="submit"><i class="fa fa-save"></i> 保存</button>&nbsp;&nbsp;&nbsp;
                <a class="btn btn-danger" href="javascript:history.go(-1);"><i class="fa fa-close"></i> 返回</a>
            </div>
        </div>
    </form>
</div>
</div>
{include file="public/footer" /}
<script type="text/javascript">
$(function(){
    $('#add_memberprice').ajaxForm({
        beforeSubmit: function(){
            if(''==$.trim($('#price').val())){
                layer.msg('请输入会员私密价格',{icon:2,time:1500,shade:0.1});
                return false;
            }
            if(''==$.trim($('#account').val())){
                layer.msg('请输入会员名称',{icon:2,time:1500,shade:0.1});
                return false;
            }
        },
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1},function(){ window.location.href="{:url('category/index')}"; });
            }else{
                layer.msg(data.msg,{icon:5,time:1500,shade:0.1});
                return false;
            }
        },
        dataType:'json'
    });
    var elem = document.querySelector('.js-switch');
    if(elem){ var switchery = new Switchery(elem, {color:'#1AB394'}); }
    var config = {'.chosen-select':{}};
    for(var selector in config){ $(selector).chosen(config[selector]); }
});
</script>
</body>
</html>
