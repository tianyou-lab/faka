{include file="public/header" /}
{literal}<style>
.g-page{padding:10px}
.g-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e8e8e8}
.g-search{display:flex;align-items:center;gap:6px;flex:1;min-width:220px}
.g-search input{height:30px;border:1px solid #d9d9d9;border-radius:4px;padding:0 8px;font-size:12px;flex:1;min-width:160px;outline:none;transition:border .2s}
.g-search input:focus{border-color:#2563eb}
.g-btn{height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#fff}
.g-btn-info{background:#0ea5e9}.g-btn-info:hover{background:#0284c7;color:#fff}
.g-btn-search{background:#2563eb;color:#fff;border:none;height:30px;padding:0 12px;border-radius:4px;font-size:12px;cursor:pointer}
.g-table-wrap{background:#fff;border-radius:6px;border:1px solid #e8e8e8;overflow-x:auto}
.g-table{width:100%;border-collapse:collapse;font-size:12px}
.g-table th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.g-table td{padding:5px 10px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:middle}
.g-table tr:hover td{background:#f8fafc}
.g-price-input{width:80px;text-align:center;height:24px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;outline:none}
.g-price-input:focus{border-color:#2563eb}
.g-act{padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;color:#475569;transition:all .15s;text-decoration:none;display:inline-block}
.g-act:hover{border-color:#2563eb;color:#2563eb}
.g-act-del{color:#ef4444;border-color:#fecaca}.g-act-del:hover{background:#fef2f2;border-color:#ef4444;color:#ef4444}
.g-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#fff;border-radius:0 0 6px 6px;border-top:1px solid #e8e8e8}
.g-total{font-size:13px;color:#64748b}
.g-empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
.spiner-example{text-align:center;padding:60px}
.sk-spinner-three-bounce .sk-bounce1,.sk-spinner-three-bounce .sk-bounce2,.sk-spinner-three-bounce .sk-bounce3{width:12px;height:12px;background:#2563eb;border-radius:50%;display:inline-block;animation:sk-bouncedelay 1.4s infinite ease-in-out both}
.sk-spinner-three-bounce .sk-bounce1{animation-delay:-.32s}
.sk-spinner-three-bounce .sk-bounce2{animation-delay:-.16s}
@keyframes sk-bouncedelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">

<div class="g-toolbar">
    <div class="g-search">
        <input type="text" id="key" value="{$val}" placeholder="搜索会员名/商品关键词" />
        <button class="g-btn-search" onclick="Ajaxpage()"><i class="fa fa-search"></i> 搜索</button>
    </div>
</div>

<div class="g-table-wrap">
    <form name="admin_list_sea" id="ruleprice" class="form-search" method="post" action="{:url('member/edit_memberprice')}">
    <table class="g-table">
        <thead>
            <tr>
                <th width="6%">ID</th>
                <th>会员名称</th>
                <th>商品名称</th>
                <th width="15%">价格(元)</th>
                <th width="12%">操作</th>
            </tr>
        </thead>
        <script id="list-template" type="text/html">
            {{# for(var i=0;i<d.length;i++){  }}
            <tr>
                <td style="color:#94a3b8">{{d[i].id}}</td>
                <td>{{d[i].account}}</td>
                <td>{{d[i].goodname}}</td>
                <td><input name="price[{{d[i].id}}]" value="{{toDecimal(d[i].price/100)}}" class="g-price-input" onkeyup="if(isNaN(value))execCommand('undo')" onafterpaste="if(isNaN(value))execCommand('undo')"></td>
                <td>
                    <a class="g-act g-act-del" href="javascript:;" onclick="del_memberprice({{d[i].id}})"><i class="fa fa-trash-o"></i> 删除</a>
                </td>
            </tr>
            {{# } }}
        </script>
        <tbody id="list-content"></tbody>
    </table>
    <div class="g-footer">
        <button type="submit" class="g-btn g-btn-info"><i class="fa fa-save"></i> 更新价格</button>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="g-total">共 {$count} 条数据</span>
            <span id="allpage" class="g-total"></span>
            <div id="AjaxPage"></div>
        </div>
    </div>
    </form>
</div>

</div>

<div class="spiner-example">
    <div class="sk-spinner sk-spinner-three-bounce">
        <div class="sk-bounce1"></div>
        <div class="sk-bounce2"></div>
        <div class="sk-bounce3"></div>
    </div>
</div>

{include file="public/footer" /}

<script type="text/javascript">
var _URL_MEMBERPRICE='{:url("Member/memberprice")}';
var _URL_DEL_MEMBERPRICE='{:url("del_memberprice")}';
var _URL_MEMBER_MEMBERPRICE='{:url("member/memberprice")}';
var _ALLPAGE='{$allpage}';
</script>
{literal}
<script type="text/javascript">

$('#key').on('keydown',function(e){if(e.keyCode==13){Ajaxpage();return false;}});

Ajaxpage();
function Ajaxpage(curr){
    var key=$('#key').val();
    $.getJSON(_URL_MEMBERPRICE, {page: curr || 1,key:key}, function(data){
        $(".spiner-example").css('display','none');
        if(data==''){
            $("#list-content").html('<tr><td colspan="5" class="g-empty">暂无数据</td></tr>');
        }else{
            var tpl = document.getElementById('list-template').innerHTML;
            laytpl(tpl).render(data, function(html){
                document.getElementById('list-content').innerHTML = html;
            });
            laypage({
                cont: $('#AjaxPage'),
                pages: _ALLPAGE,
                skip: true,
                skin: '#2563eb',
                curr: curr || 1,
                groups: 5,
                jump: function(obj, first){
                    if(!first){ Ajaxpage(obj.curr) }
                    $('#allpage').html('第'+ obj.curr +'页 / 共'+ obj.pages +'页');
                }
            });
        }
    });
}

function del_memberprice(id){ lunhui.confirm(id,_URL_DEL_MEMBERPRICE); }

$(function(){
    $('#ruleprice').ajaxForm({
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:1,time:1500,shade:0.1},function(){ window.location.href=_URL_MEMBER_MEMBERPRICE; });
            }else{
                layer.msg(data.msg,{icon:2,time:1500,shade:0.1},function(index){ layer.close(index); window.location.href=data.url; });
            }
        },
        dataType:'json'
    });
});

function toDecimal(x){
    var f=parseFloat(x);if(isNaN(f))return false;
    if(getFloor(x)<2){f=Math.round(x*100)/100;}else if(getFloor(x)>2){f=Math.round(x*10000)/10000;}
    var s=f.toString();var rs=s.indexOf('.');if(rs<0){rs=s.length;s+='.';}
    while(s.length<=rs+2){s+='0';}return s;
}
function getFloor(x){var y=String(x).indexOf('.')+1;var count=String(x).length-y;if(y<=0){count=0;}return count;}
</script>
{/literal}
</body>
</html>
