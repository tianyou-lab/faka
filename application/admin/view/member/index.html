{include file="public/header" /}
{literal}<style>

.g-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e8e8e8}

.g-search input:focus{border-color:#2563eb}

.g-btn-primary{background:#2563eb}.g-btn-primary:hover{background:#1d4ed8;color:#fff}

.g-table tr:hover td{background:#f8fafc}
.g-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer}
.g-tag-on{background:#dcfce7;color:#166534}.g-tag-off{background:#fee2e2;color:#991b1b}

.g-act:hover{border-color:#2563eb;color:#2563eb}
.g-act-del{color:#ef4444;border-color:#fecaca}.g-act-del:hover{background:#fef2f2;border-color:#ef4444;color:#ef4444}
.g-act-success{color:#059669;border-color:#a7f3d0}.g-act-success:hover{background:#ecfdf5;border-color:#059669}

.g-contact i{width:14px;color:#94a3b8;margin-right:2px}

.g-total{font-size:13px;color:#64748b}
.g-empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
.spiner-example{text-align:center;padding:60px}
.sk-spinner-three-bounce .sk-bounce1,.sk-spinner-three-bounce .sk-bounce2,.sk-spinner-three-bounce .sk-bounce3{width:12px;height:12px;background:#2563eb;border-radius:50%;display:inline-block;animation:sk-bouncedelay 1.4s infinite ease-in-out both}
.sk-spinner-three-bounce .sk-bounce1{animation-delay:-.32s}
.sk-spinner-three-bounce .sk-bounce2{animation-delay:-.16s}
@keyframes sk-bouncedelay{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
{/literal}
<body class="gray-bg">
<div class="g-page">

<div class="g-toolbar">
    <a href="{:url('add_member')}" class="g-btn g-btn-primary"><i class="fa fa-plus"></i> 添加会员</a>
    <select class="g-sel" id="group_id" onchange="Ajaxpage()">
        <option value="999" {if condition="$group_id eq 999"}selected{/if}>全部分组</option>
        <option value="0" {if condition="$group_id eq 0"}selected{/if}>注册会员</option>
        {volist name="search_user" id="v"}
        <option value="{$key}" {if condition="$group_id eq $key"}selected{/if}>{$v}</option>
        {/volist}
    </select>
    <div class="g-search">
        <input type="text" id="key" value="{$val}" placeholder="搜索会员账号/昵称/手机号" />
        <button class="g-btn-search" onclick="Ajaxpage()"><i class="fa fa-search"></i> 搜索</button>
    </div>
</div>

<div class="g-stats">
    <div>会员数量: <span>{$count}</span></div>
    <div>总余额: <span>{$Zmoney[0]} 元</span></div>
    <div>待提现佣金: <span>{$Ztgmoney[0]} 元</span></div>
</div>

<div class="g-table-wrap">
    <table class="g-table">
        <thead>
            <tr>
                <th width="4%">ID</th>
                <th width="9%">账号</th>
                <th width="6%">所属组</th>
                <th width="5%">积分</th>
                <th width="6%">余额</th>
                <th width="6%">佣金</th>
                <th width="5%">分销商</th>
                <th width="10%">联系方式</th>
                <th width="10%">最后登录IP</th>
                <th width="10%">登录/注册时间</th>
                <th width="4%">登录次数</th>
                <th width="5%">状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <script id="list-template" type="text/html">
            {{# for(var i=0;i<d.length;i++){  }}
            <tr>
                <td style="color:#94a3b8">{{d[i].id}}</td>
                <td><span style="color:#2563eb;font-weight:500">{{d[i].account}}</span></td>
                <td><span style="color:#059669">{{d[i].group_name}}</span></td>
                <td><span class="g-tag g-tag-success">{{d[i].integral}}</span></td>
                <td><span class="g-tag g-tag-info">{{toDecimal(d[i].money)}}</span></td>
                <td><span class="g-tag g-tag-warn">{{toDecimal(d[i].tg_money)}}</span></td>
                <td>
                    {{# if(d[i].is_distribut==1){ }}
                    <a href="javascript:;" onclick="member_distribut({{d[i].id}});"><span class="g-tag g-tag-yes" id="distribut{{d[i].id}}">是</span></a>
                    {{# }else{ }}
                    <a href="javascript:;" onclick="member_distribut({{d[i].id}});"><span class="g-tag g-tag-no" id="distribut{{d[i].id}}">否</span></a>
                    {{# } }}
                </td>
                <td class="g-contact">
                    <div><i class="fa fa-phone"></i>{{d[i].mobile}}</div>
                    <div><i class="fa fa-envelope"></i>{{d[i].email}}</div>
                    <div><i class="fa fa-qq"></i>{{d[i].qq}}</div>
                </td>
                <td style="font-size:11px">{{d[i].ipaddr.country}}{{d[i].ipaddr.area}}<br>{{d[i].last_login_ip}}</td>
                <td style="font-size:11px">{{d[i].last_login_time}}<br>{{d[i].create_time}}</td>
                <td><span class="g-tag g-tag-warn">{{d[i].login_num}}</span></td>
                <td>
                    {{# if(d[i].status==1){ }}
                    <a href="javascript:;" onclick="member_status({{d[i].id}});"><span class="g-tag g-tag-on" id="zt{{d[i].id}}">开启</span></a>
                    {{# }else{ }}
                    <a href="javascript:;" onclick="member_status({{d[i].id}});"><span class="g-tag g-tag-off" id="zt{{d[i].id}}">禁用</span></a>
                    {{# } }}
                </td>
                <td>
                    <a class="g-act" target="_blank" href="{:url('login_member')}?id={{d[i].id}}"><i class="fa fa-sign-in"></i> 后台</a>
                    <a class="g-act" href="javascript:;" onclick="edit_member('{{d[i].id}}')"><i class="fa fa-paste"></i> 编辑</a>
                    <a class="g-act g-act-del" href="javascript:;" onclick="del_member('{{d[i].id}}')"><i class="fa fa-trash-o"></i> 删除</a>
                    <a class="g-act g-act-success" href="javascript:;" onclick="edit_money('{{d[i].id}}','{{d[i].account}}','{{d[i].money}}')" data-toggle="modal" data-target="#myModalMoney"><i class="fa fa-money"></i> 余额</a>
                    <a class="g-act g-act-success" href="javascript:;" onclick="edit_point('{{d[i].id}}','{{d[i].account}}','{{d[i].integral}}')" data-toggle="modal" data-target="#myModalPoint"><i class="fa fa-hand-pointer-o"></i> 积分</a>
                    <a class="g-act g-act-del" href="javascript:;" onclick="updatePass('{{d[i].id}}','{{d[i].account}}')"><i class="fa fa-user"></i> 重置密码</a>
                </td>
            </tr>
            {{# } }}
        </script>
        <tbody id="list-content"></tbody>
    </table>
    <div class="g-footer">
        <span class="g-total">共 {$count} 条数据</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <span id="allpage" class="g-total"></span>
            <div id="AjaxPage"></div>
        </div>
    </div>
</div>

</div>

<div class="spiner-example">
    <div class="sk-spinner sk-spinner-three-bounce">
        <div class="sk-bounce1"></div>
        <div class="sk-bounce2"></div>
        <div class="sk-bounce3"></div>
    </div>
</div>

<div class="modal fade" id="myModalMoney" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span class="sr-only">Close</span></button>
                <h3 class="modal-title">修改金额</h3>
            </div>
            <form class="form-horizontal" name="form" id="formid" method="post" action="{:url('edit_money')}">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="col-sm-3 control-label">会员ID</label>
                        <div class="col-sm-8">
                            <input type="hidden" name="id" id="accountid" value="">
                            <input type="text" name="memberid" id="memberid" placeholder="会员ID" class="form-control" disabled="disabled" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">当前用户</label>
                        <div class="col-sm-8">
                            <input type="text" name="member" id="member" placeholder="当前用户" disabled="disabled" class="form-control" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">当前余额</label>
                        <div class="col-sm-8">
                            <input type="text" name="money" id="money" placeholder="当前余额" disabled="disabled" class="form-control" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">修改类型</label>
                        <div class="col-sm-6">
                            <div class="radio i-checks">
                                <input type="radio" name='status' value="1" checked="checked"/>增加&nbsp;&nbsp;
                                <input type="radio" name='status' value="0" />扣除
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">变动金额</label>
                        <div class="col-sm-8">
                            <input type="num" name="newmoney" id="newmoney" placeholder="变动金额" class="form-control" onkeyup="if(isNaN(value))execCommand('undo')" onafterpaste="if(isNaN(value))execCommand('undo')" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">超级密码</label>
                        <div class="col-sm-8">
                            <input type="password" name="superpwd" id="superpwd" placeholder="超级密码" class="form-control" value=""/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> 保存</button>
                    <button type="button" class="btn btn-danger" data-dismiss="modal"><i class="fa fa-close"></i> 关闭</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="myModalPoint" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">&times;</span><span class="sr-only">Close</span></button>
                <h3 class="modal-title">修改积分</h3>
            </div>
            <form class="form-horizontal" name="form" id="formidpoint" method="post" action="{:url('edit_point')}">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="col-sm-3 control-label">会员ID</label>
                        <div class="col-sm-8">
                            <input type="hidden" name="id" id="accountidpoint" value="">
                            <input type="text" name="memberidpoint" id="memberidpoint" placeholder="会员ID" class="form-control" disabled="disabled" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">当前用户</label>
                        <div class="col-sm-8">
                            <input type="text" name="memberpoint" id="memberpoint" placeholder="当前用户" disabled="disabled" class="form-control" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">当前积分</label>
                        <div class="col-sm-8">
                            <input type="text" name="point" id="point" placeholder="当前积分" disabled="disabled" class="form-control" value=""/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">修改类型</label>
                        <div class="col-sm-6">
                            <div class="radio i-checks">
                                <input type="radio" name='status' value="1" checked="checked"/>增加&nbsp;&nbsp;
                                <input type="radio" name='status' value="0" />扣除
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">变动积分</label>
                        <div class="col-sm-8">
                            <input type="text" name="newpoint" id="newpoint" placeholder="变动积分" class="form-control" onkeyup="if(isNaN(value))execCommand('undo')" onafterpaste="if(isNaN(value))execCommand('undo')" value=""/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> 保存</button>
                    <button type="button" class="btn btn-danger" data-dismiss="modal"><i class="fa fa-close"></i> 关闭</button>
                </div>
            </form>
        </div>
    </div>
</div>

{include file="public/footer" /}

<script type="text/javascript">
var _URL_INDEX='{:url("Member/index")}';
var _URL_DEL_MEMBER='{:url("del_member")}';
var _URL_MEMBER_STATUS='{:url("member_status")}';
var _URL_MEMBER_DISTRIBUT='{:url("member_distribut")}';
var _URL_MEMBER_INDEX='{:url("member/index")}';
var _ALLPAGE='{$allpage}';
</script>
{literal}
<script type="text/javascript">

$('#key').on('keydown',function(e){if(e.keyCode==13){Ajaxpage();return false;}});

Ajaxpage();
function Ajaxpage(curr){
    var key=$('#key').val();
    var group_id=$('#group_id').val();
    $.getJSON(_URL_INDEX, {page: curr || 1,key:key,group_id:group_id}, function(data){
        $(".spiner-example").css('display','none');
        if(data==''){
            $("#list-content").html('<tr><td colspan="13" class="g-empty">暂无数据</td></tr>');
        }else{
            var tpl = document.getElementById('list-template').innerHTML;
            laytpl(tpl).render(data, function(html){
                document.getElementById('list-content').innerHTML = html;
            });
            laypage({
                cont: $('#AjaxPage'),
                pages: _ALLPAGE,
                skip: true,
                skin: '#2563eb',
                curr: curr || 1,
                groups: 5,
                jump: function(obj, first){
                    if(!first){ Ajaxpage(obj.curr) }
                    $('#allpage').html('第'+ obj.curr +'页 / 共'+ obj.pages +'页');
                }
            });
        }
    });
}

function edit_member(id){ location.href = './edit_member/id/'+id+'.html'; }
function del_member(id){ lunhui.confirm(id,_URL_DEL_MEMBER); }
function member_status(id){ lunhui.status(id,_URL_MEMBER_STATUS); }
function member_distribut(id){ lunhui.distribut(id,_URL_MEMBER_DISTRIBUT); }

function edit_money(id,account,money){
    $('#memberid').val(id);
    $('#accountid').val(id);
    $('#member').val(account);
    $('#money').val(money);
}
function edit_point(id,account,point){
    $('#memberidpoint').val(id);
    $('#accountidpoint').val(id);
    $('#memberpoint').val(account);
    $('#point').val(point);
}
function updatePass(id,account){
    layer.confirm('是否重置会员 ['+account+'] 的登录密码?', {btn:['确定','取消']}, function(index){
        $.ajax({url:"./edit_pass/id/"+id+".html", success:function(res){
            if(res.code==1){ layer.alert("密码重置成功："+res.data); }
            else{ layer.alert("密码重置失败"); }
        }});
        layer.close(index);
    });
}

$(function(){
    $('#formid').ajaxForm({
        beforeSubmit: function(){
            if(''==$.trim($('#newmoney').val())){
                layer.msg('请输入变动金额',{icon:2,time:1500,shade:0.1});
                return false;
            }
        },
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1},function(){ window.location.href=_URL_MEMBER_INDEX; });
            }else{
                layer.msg(data.msg,{icon:2,time:1500,shade:0.1});
                return false;
            }
        },
        dataType:'json'
    });
    $('#formidpoint').ajaxForm({
        beforeSubmit: function(){
            if(''==$.trim($('#newpoint').val())){
                layer.msg('请输入变动积分',{icon:2,time:1500,shade:0.1});
                return false;
            }
        },
        success: function(data){
            if(data.code==1){
                layer.msg(data.msg,{icon:6,time:1500,shade:0.1},function(){ window.location.href=_URL_MEMBER_INDEX; });
            }else{
                layer.msg(data.msg,{icon:2,time:1500,shade:0.1});
                return false;
            }
        },
        dataType:'json'
    });
});

function toDecimal(x){
    var f=parseFloat(x);if(isNaN(f))return false;
    if(getFloor(x)<2){f=Math.round(x*100)/100;}else if(getFloor(x)>2){f=Math.round(x*10000)/10000;}
    var s=f.toString();var rs=s.indexOf('.');if(rs<0){rs=s.length;s+='.';}
    while(s.length<=rs+2){s+='0';}return s;
}
function getFloor(x){var y=String(x).indexOf('.')+1;var count=String(x).length-y;if(y<=0){count=0;}return count;}
</script>
{/literal}
</body>
</html>
